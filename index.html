<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Hacker Terminal</title>

<style>

body{
margin:0;
background:black;
color:#00ff9c;
font-family:Courier New, monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#terminal{
padding:40px;
max-width:900px;
}

.line{
margin:6px 0;
}

.input-line{
display:flex;
}

.prompt{
margin-right:6px;
}

input{
background:none;
border:none;
outline:none;
color:#00ff9c;
font-family:inherit;
font-size:16px;
width:100%;
}

a{
color:#00ff9c;
text-decoration:none;
}

a:hover{
text-shadow:0 0 10px #00ff9c;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div id="terminal">

<div class="line">Booting system...</div>
<div class="line">Access granted.</div>
<div class="line">Type help to see commands</div>

<div class="input-line">
<span class="prompt">></span>
<input id="cmd" autofocus>
</div>

</div>

<script>

const terminal=document.getElementById("terminal")
const input=document.getElementById("cmd")

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=input.value.toLowerCase()
print("> "+cmd)

run(cmd)

input.value=""

}

})

function print(text){

let div=document.createElement("div")
div.className="line"
div.innerHTML=text
terminal.insertBefore(div,input.parentNode)

}

function run(cmd){

if(cmd==="help"){

print("whoami - info")
print("instagram - open instagram")
print("telegram - open telegram")
print("github - open github")
print("links - show links")
print("clear - clear terminal")

}

else if(cmd==="whoami"){

print("Name: YOUR NAME")
print("Role: Developer / Hacker")
print("Status: Online")

}

else if(cmd==="instagram"){

print("Opening Instagram...")
window.open("https://instagram.com/muhammad_emin8558","_blank")

}

else if(cmd==="telegram"){

print("Opening Telegram...")
window.open("https://t.me/s1mplesc2","_blank")

}

else if(cmd==="github"){

print("Opening GitHub...")
window.open("https://github.com/none","_blank")

}

else if(cmd==="links"){

print('instagram: instagram.com/muhammad_emin8558')
print('telegram: t.me/s1mplesc2')
print('github: github.com/none')

}

else if(cmd==="clear"){

location.reload()

}

else{

print("command not found")

}

}

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01"
const fontSize=14
const columns=canvas.width/fontSize

const drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

</script>

</body>
</html>
